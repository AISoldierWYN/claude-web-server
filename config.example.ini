# Claude Web Server — 主配置文件（项目根目录）
# 优先级：环境变量 > 本文件 > 代码内置默认值
# 修改后需重启服务

[server]
host = 0.0.0.0
port = 8080

[auth]
# 访问令牌；留空表示不启用 URL 鉴权（仍可被命令行 python server.py <token> 覆盖）
token =

[claude]
# Claude CLI 可执行文件路径；留空则自动查找（Windows：npm claude.cmd；Linux/macOS：~/.local/bin 等常见路径 + PATH）
cli_path =
# 若 CLI 支持，将附加 --model <值>；留空则不传
model =
# 传给 Claude CLI 的 --permission-mode，见 README
permission_mode = bypassPermissions
# 是否追加 --dangerously-skip-permissions（仅可信环境）
dangerously_skip_permissions = false
# 是否将会话子进程的 HOME 指到会话目录（隔离 ~/.claude，副作用见 README）
isolate_home = false
# 默认开启：为每个对话 fork 一个会话 HOME，继承父机 ~/.claude 的 skills/配置/凭证，但不继承全局 CLAUDE.md 记忆
fork_claude_home = true
# 外环编排：单次用户消息最多启动多少次完整 claude 子进程
orch_max_rounds = 20
# 附加 CLI 参数（按 shell 规则拆分，例如：--setting foo）；谨慎使用
extra_args =

[paths]
# 技能包/只读路径 JSON，相对项目根目录的文件名或子路径
paths_config_file = claude_web_paths.config.json
# 以下留空则使用项目根下默认目录名 cache、logs、backups、feedback
cache_dir =
log_dir =
backups_dir =
feedback_dir =

[upload]
# 单文件上传上限（MB）
max_size_mb = 100

[tavily]
# Tavily 联网搜索 API Key；也可用环境变量 TAVILY_API_KEY（兼容 TABILY_API_KEY）
api_key =
# basic 更省额度；advanced 更深入
search_depth = basic
max_results = 5

[proxy]
# 信任 X-Forwarded-For（反向代理场景）
trust_x_forwarded = false

[readonly]
# 额外只读目录（与 JSON、环境变量合并）；分号或英文逗号分隔，路径中勿含这些分隔符
dirs =

[features]
# V2：开启后，通过 127.0.0.1/localhost 访问仍用服务器本机 API 配置；通过局域网 IP/域名访问时
# 使用各用户在侧栏「API 配置」中保存的 ANTHROPIC_* 等环境变量与 model（存于 cache 下用户目录）。
v2_multi_user_api = false
# V3：可选。标记「面向 Linux 服务器部署」时在日志中提示；**不**关闭时也可在 Linux 上运行（由 sys.platform 自动适配）。
v3_linux_deploy = false
