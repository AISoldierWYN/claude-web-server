<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <title>Claude Chat</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');

        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --bg-primary: #0F0F1A;
            --bg-secondary: #1A1A2E;
            --bg-sidebar: #141425;
            --bg-chat: #0F0F1A;
            --bg-input: #1E1E35;
            --bg-hover: #252545;
            --bg-active: #2D2D55;
            --text-primary: #E6E6E6;
            --text-secondary: #8888A0;
            --text-muted: #555570;
            --accent: #7C3AED;
            --accent-hover: #8B5CF6;
            --accent-glow: rgba(124, 58, 237, 0.25);
            --user-bubble: #5B2DA0;
            --ai-bubble: #1A1A35;
            --thinking-bg: #151530;
            --border: #2A2A4A;
            --success: #4ADE80;
            --danger: #EF4444;
            --warning: #F59E0B;
            --sidebar-width: 280px;
            --radius: 12px;
            --radius-sm: 8px;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            height: 100vh;
            overflow: hidden;
        }

        /* ============ Layout ============ */
        .app {
            display: flex;
            height: 100vh;
        }

        /* ============ Sidebar ============ */
        .sidebar {
            width: var(--sidebar-width);
            background: var(--bg-sidebar);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            flex-shrink: 0;
            transition: transform 0.3s ease;
            z-index: 100;
        }

        .sidebar-header {
            padding: 20px 16px 12px;
            border-bottom: 1px solid var(--border);
        }

        .sidebar-logo {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 16px;
        }

        .sidebar-logo .logo-icon {
            width: 32px;
            height: 32px;
            background: linear-gradient(135deg, var(--accent), #a855f7);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 14px;
            color: #fff;
        }

        .sidebar-logo .logo-text {
            font-size: 17px;
            font-weight: 700;
            background: linear-gradient(135deg, #fff, #c4b5fd);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .new-chat-btn {
            width: 100%;
            padding: 10px;
            background: linear-gradient(135deg, var(--accent), #6D28D9);
            color: #fff;
            border: none;
            border-radius: var(--radius-sm);
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: all 0.2s;
        }

        .new-chat-btn:hover {
            background: linear-gradient(135deg, var(--accent-hover), #7C3AED);
            box-shadow: 0 0 20px var(--accent-glow);
        }

        .new-chat-btn svg { width: 16px; height: 16px; }

        .sidebar-list {
            flex: 1;
            overflow-y: auto;
            padding: 8px;
        }

        .sidebar-list::-webkit-scrollbar { width: 4px; }
        .sidebar-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

        .session-item {
            padding: 10px 12px;
            border-radius: var(--radius-sm);
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 10px;
            transition: all 0.15s;
            margin-bottom: 2px;
            position: relative;
        }

        .session-item:hover { background: var(--bg-hover); }
        .session-item.active { background: var(--bg-active); }

        .session-item .session-icon {
            width: 18px;
            height: 18px;
            color: var(--text-secondary);
            flex-shrink: 0;
        }

        .session-item .session-info {
            flex: 1;
            min-width: 0;
        }

        .session-item .session-title {
            font-size: 13px;
            font-weight: 500;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .session-item .session-time {
            font-size: 11px;
            color: var(--text-muted);
            margin-top: 2px;
        }

        .session-item .session-menu-btn {
            opacity: 0;
            background: none;
            border: none;
            color: var(--text-secondary);
            cursor: pointer;
            padding: 4px;
            border-radius: 4px;
            transition: all 0.15s;
            flex-shrink: 0;
        }

        .session-item:hover .session-menu-btn,
        .session-item.menu-open .session-menu-btn { opacity: 1; }
        .session-item .session-menu-btn:hover,
        .session-item.menu-open .session-menu-btn {
            color: var(--text-primary);
            background: rgba(255,255,255,0.08);
        }

        .session-menu {
            display: none;
            position: absolute;
            right: 8px;
            top: 34px;
            min-width: 128px;
            padding: 6px;
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            box-shadow: 0 12px 28px rgba(0,0,0,0.35);
            z-index: 120;
        }

        .session-item.menu-open .session-menu { display: block; }

        .session-menu button {
            width: 100%;
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 9px;
            border: none;
            border-radius: 6px;
            background: transparent;
            color: var(--text-secondary);
            font-size: 12px;
            text-align: left;
            cursor: pointer;
        }

        .session-menu button:hover {
            background: var(--bg-hover);
            color: var(--text-primary);
        }

        .session-menu button.danger:hover {
            color: #fecaca;
            background: rgba(239,68,68,0.16);
        }

        .sidebar-footer {
            padding: 12px 16px;
            border-top: 1px solid var(--border);
            font-size: 11px;
            color: var(--text-muted);
            text-align: center;
            display: flex;
            flex-direction: column;
            gap: 10px;
            align-items: stretch;
        }

        .sidebar-footer .footer-hint { line-height: 1.4; }

        .feedback-btn {
            width: 100%;
            padding: 8px 10px;
            background: var(--bg-input);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            color: var(--text-secondary);
            font-size: 12px;
            cursor: pointer;
            transition: all 0.15s;
        }

        .feedback-btn:hover {
            background: var(--bg-hover);
            color: var(--text-primary);
            border-color: var(--accent);
        }

        .feedback-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.55);
            z-index: 1000;
            align-items: center;
            justify-content: center;
            padding: 16px;
        }

        .feedback-overlay.show { display: flex; }

        .feedback-modal {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            width: 100%;
            max-width: 420px;
            max-height: 90vh;
            overflow: auto;
            padding: 20px;
            box-shadow: 0 16px 48px rgba(0,0,0,0.45);
        }

        .feedback-modal h3 {
            font-size: 16px;
            margin-bottom: 14px;
            font-weight: 600;
        }

        .feedback-modal label {
            display: block;
            font-size: 12px;
            color: var(--text-secondary);
            margin-bottom: 6px;
        }

        .feedback-modal textarea#v2EnvJson {
            min-height: 220px;
            font-family: ui-monospace, Consolas, monospace;
            font-size: 12px;
        }

        .feedback-modal textarea {
            width: 100%;
            min-height: 100px;
            padding: 10px;
            border-radius: var(--radius-sm);
            border: 1px solid var(--border);
            background: var(--bg-input);
            color: var(--text-primary);
            font-family: inherit;
            font-size: 14px;
            resize: vertical;
            margin-bottom: 12px;
        }

        .feedback-modal input[type="text"] {
            width: 100%;
            padding: 8px 10px;
            border-radius: var(--radius-sm);
            border: 1px solid var(--border);
            background: var(--bg-input);
            color: var(--text-primary);
            font-size: 13px;
            margin-bottom: 12px;
        }

        .feedback-modal input[type="file"] {
            font-size: 12px;
            color: var(--text-secondary);
            margin-bottom: 14px;
        }

        .feedback-modal .feedback-actions {
            display: flex;
            gap: 10px;
            justify-content: flex-end;
        }

        .feedback-modal .btn-secondary {
            padding: 8px 14px;
            border-radius: var(--radius-sm);
            border: 1px solid var(--border);
            background: transparent;
            color: var(--text-secondary);
            cursor: pointer;
            font-size: 13px;
        }

        .feedback-modal .btn-secondary:hover { background: var(--bg-hover); color: var(--text-primary); }

        .feedback-modal .btn-primary {
            padding: 8px 14px;
            border-radius: var(--radius-sm);
            border: none;
            background: linear-gradient(135deg, var(--accent), #6D28D9);
            color: #fff;
            cursor: pointer;
            font-size: 13px;
            font-weight: 500;
        }

        .feedback-modal .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }

        .toast {
            position: fixed;
            bottom: 24px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            color: var(--text-primary);
            padding: 10px 16px;
            border-radius: var(--radius-sm);
            font-size: 13px;
            z-index: 2000;
            max-width: 90%;
            box-shadow: 0 8px 24px rgba(0,0,0,0.35);
            display: none;
        }

        .toast.show { display: block; }

        /* Streaming: 计时条 + 锁定交互 */
        .stream-status-bar {
            font-size: 12px;
            color: var(--text-secondary);
            margin-bottom: 8px;
            min-height: 18px;
        }

        .stream-status-bar .stream-timer { color: #a78bfa; font-variant-numeric: tabular-nums; }

        .app.streaming-locked .sidebar,
        .app.streaming-locked .sidebar-overlay {
            pointer-events: none !important;
            opacity: 0.72;
        }

        .app.streaming-locked .main-header {
            pointer-events: none !important;
            opacity: 0.72;
        }

        .app.streaming-locked .input-area {
            pointer-events: none !important;
            opacity: 0.65;
        }

        .app.streaming-locked .main {
            pointer-events: none;
        }

        .app.streaming-locked .main .chat-container {
            pointer-events: auto;
            opacity: 1;
        }

        .app.streaming-locked .drop-zone {
            pointer-events: none !important;
            display: none !important;
        }

        .ai-stream-timeline {
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin-bottom: 8px;
            width: 100%;
        }

        .tool-block {
            border-radius: var(--radius-sm);
            border: 1px solid rgba(124,58,237,0.25);
            background: var(--thinking-bg);
            overflow: hidden;
            font-size: 12px;
        }

        .tool-header {
            padding: 8px 12px;
            color: #c4b5fd;
            font-weight: 600;
            border-bottom: 1px solid var(--border);
        }

        .tool-body {
            margin: 0;
            padding: 10px 12px;
            max-height: 220px;
            overflow: auto;
            white-space: pre-wrap;
            word-break: break-word;
            color: var(--text-secondary);
            font-family: ui-monospace, Consolas, monospace;
            font-size: 12px;
        }

        .message-bubble.answer-bubble {
            min-height: 1.2em;
        }

        .message-bubble.markdown-body {
            white-space: normal;
        }

        .markdown-body > :first-child { margin-top: 0; }
        .markdown-body > :last-child { margin-bottom: 0; }

        .markdown-body p,
        .markdown-body ul,
        .markdown-body ol,
        .markdown-body pre,
        .markdown-body blockquote,
        .markdown-body .markdown-table-wrap {
            margin: 0 0 0.85em;
        }

        .markdown-body h1,
        .markdown-body h2,
        .markdown-body h3,
        .markdown-body h4 {
            margin: 1em 0 0.45em;
            line-height: 1.35;
            font-weight: 700;
        }

        .markdown-body h1 { font-size: 1.35em; }
        .markdown-body h2 { font-size: 1.22em; }
        .markdown-body h3 { font-size: 1.1em; }
        .markdown-body h4 { font-size: 1em; }

        .markdown-body ul,
        .markdown-body ol {
            padding-left: 1.35em;
        }

        .markdown-body li + li { margin-top: 0.25em; }

        .markdown-body code {
            padding: 0.1em 0.35em;
            border-radius: 5px;
            background: rgba(255,255,255,0.08);
            font-family: ui-monospace, SFMono-Regular, Consolas, 'Liberation Mono', monospace;
            font-size: 0.92em;
        }

        .markdown-body pre {
            padding: 12px;
            border-radius: var(--radius-sm);
            border: 1px solid rgba(255,255,255,0.08);
            background: rgba(0,0,0,0.28);
            overflow: auto;
            white-space: pre;
        }

        .markdown-body pre code {
            padding: 0;
            background: transparent;
            border-radius: 0;
            font-size: 0.92em;
        }

        .markdown-body blockquote {
            padding: 0.2em 0 0.2em 0.9em;
            border-left: 3px solid rgba(196,181,253,0.55);
            color: var(--text-secondary);
        }

        .markdown-body a {
            color: #c4b5fd;
            text-decoration: none;
            border-bottom: 1px solid rgba(196,181,253,0.35);
        }

        .markdown-body .markdown-table-wrap {
            width: 100%;
            overflow-x: auto;
            border-radius: var(--radius-sm);
            border: 1px solid rgba(255,255,255,0.1);
        }

        .markdown-body table {
            width: 100%;
            border-collapse: collapse;
            min-width: max-content;
            background: rgba(0,0,0,0.12);
            font-size: 13px;
            line-height: 1.55;
        }

        .markdown-body th,
        .markdown-body td {
            padding: 8px 10px;
            border: 1px solid rgba(255,255,255,0.12);
            vertical-align: top;
            white-space: nowrap;
        }

        .markdown-body th {
            background: rgba(124,58,237,0.22);
            color: #f3edff;
            font-weight: 700;
            text-align: left;
        }

        .markdown-body tr:nth-child(even) td {
            background: rgba(255,255,255,0.035);
        }

        /* 整块思考区折叠（DeepSeek 风格） */
        .reasoning-panel {
            border: 1px solid rgba(124,58,237,0.25);
            border-radius: var(--radius-sm);
            margin-bottom: 10px;
            overflow: hidden;
            background: rgba(20, 21, 48, 0.6);
        }

        .reasoning-panel-head {
            width: 100%;
            display: flex;
            align-items: center;
            gap: 8px;
            flex-wrap: wrap;
            padding: 8px 12px;
            background: var(--thinking-bg);
            border: none;
            color: var(--text-secondary);
            font-size: 13px;
            cursor: pointer;
            text-align: left;
            transition: background 0.15s;
        }

        .reasoning-panel-head:hover { background: var(--bg-hover); color: var(--text-primary); }

        .reasoning-panel-head .rph-title { font-weight: 600; color: #c4b5fd; }

        .reasoning-panel-head .rph-sub { font-size: 11px; opacity: 0.75; }

        .rph-compact-row {
            display: none;
            align-items: center;
            gap: 8px;
            color: var(--text-secondary);
        }

        .rpt-mini-spin {
            width: 14px;
            height: 14px;
            border: 2px solid var(--border);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            flex-shrink: 0;
        }

        .reasoning-panel.stream-finished .rpt-mini-spin {
            display: none !important;
        }

        .reasoning-panel.stream-finished .rph-compact-label {
            color: var(--text-secondary);
            opacity: 0.95;
        }

        .reasoning-panel:not(.open) .reasoning-panel-detail { display: none; }

        .reasoning-panel:not(.open) .rph-expanded-only { display: none !important; }

        .reasoning-panel:not(.open) .rph-compact-row { display: inline-flex; }

        .reasoning-panel.open .rph-chevron { transform: rotate(0deg); }

        .reasoning-panel:not(.open) .rph-chevron { transform: rotate(-90deg); }

        .reasoning-panel.open .rph-compact-row { display: none !important; }

        .rph-chevron {
            margin-left: auto;
            transition: transform 0.2s;
            flex-shrink: 0;
        }

        .reasoning-panel-detail {
            padding: 10px 12px;
            border-top: 1px solid rgba(124,58,237,0.15);
        }

        /* ============ Main Area ============ */
        .main {
            flex: 1;
            display: flex;
            flex-direction: column;
            min-width: 0;
            background: var(--bg-chat);
        }

        .main-header {
            padding: 12px 20px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 12px;
            flex-shrink: 0;
            background: var(--bg-secondary);
        }

        .menu-toggle {
            display: none;
            background: none;
            border: none;
            color: var(--text-primary);
            cursor: pointer;
            padding: 4px;
            border-radius: 6px;
        }

        .menu-toggle:hover { background: var(--bg-hover); }
        .menu-toggle svg { width: 20px; height: 20px; }

        .main-header .header-title {
            font-size: 15px;
            font-weight: 600;
            flex: 1;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .header-actions { display: flex; gap: 6px; }

        .icon-btn {
            background: none;
            border: 1px solid var(--border);
            color: var(--text-secondary);
            cursor: pointer;
            padding: 6px 8px;
            border-radius: var(--radius-sm);
            font-size: 12px;
            display: flex;
            align-items: center;
            gap: 4px;
            transition: all 0.15s;
        }

        .icon-btn:hover { background: var(--bg-hover); color: var(--text-primary); }
        .icon-btn.danger:hover { color: var(--danger); border-color: var(--danger); }
        .icon-btn svg { width: 14px; height: 14px; }

        /* ============ Chat Area ============ */
        .chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
        }

        .chat-container::-webkit-scrollbar { width: 6px; }
        .chat-container::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

        /* Welcome */
        .welcome {
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 16px;
            color: var(--text-secondary);
        }

        .welcome-icon {
            width: 64px;
            height: 64px;
            background: linear-gradient(135deg, var(--accent), #a855f7);
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            box-shadow: 0 0 40px var(--accent-glow);
        }

        .welcome h2 {
            font-size: 22px;
            color: var(--text-primary);
            font-weight: 700;
        }

        .welcome p {
            font-size: 14px;
            max-width: 400px;
            text-align: center;
            line-height: 1.7;
        }

        /* Messages */
        .message-row {
            display: flex;
            margin-bottom: 20px;
            gap: 12px;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .message-row.user { justify-content: flex-end; }

        .message-avatar {
            width: 32px;
            height: 32px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 13px;
            font-weight: 600;
            flex-shrink: 0;
        }

        .message-avatar.ai {
            background: linear-gradient(135deg, var(--accent), #6D28D9);
            color: #fff;
        }

        .message-avatar.user-av {
            background: #5B2DA0;
            color: #fff;
        }

        .message-content {
            max-width: 72%;
            min-width: 60px;
        }

        .message-bubble {
            padding: 12px 16px;
            border-radius: 16px;
            line-height: 1.7;
            font-size: 14px;
            word-wrap: break-word;
            white-space: pre-wrap;
        }

        .message-row.user .message-bubble {
            background: var(--user-bubble);
            border-bottom-right-radius: 4px;
        }

        .message-row.ai .message-bubble {
            background: var(--ai-bubble);
            border: 1px solid var(--border);
            border-bottom-left-radius: 4px;
        }

        .message-files {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            margin-bottom: 8px;
        }

        .file-tag {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            padding: 3px 10px;
            background: rgba(124,58,237,0.15);
            border: 1px solid rgba(124,58,237,0.3);
            border-radius: 20px;
            font-size: 12px;
            color: #c4b5fd;
        }

        .file-tag svg { width: 12px; height: 12px; }

        /* Thinking */
        .thinking-block {
            margin-bottom: 8px;
            border-radius: var(--radius-sm);
            overflow: hidden;
            border: 1px solid rgba(124,58,237,0.2);
        }

        .thinking-header {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 8px 12px;
            background: var(--thinking-bg);
            cursor: pointer;
            font-size: 12px;
            color: var(--text-secondary);
            transition: background 0.15s;
        }

        .thinking-header:hover { background: var(--bg-hover); }

        .thinking-header .thinking-spinner {
            width: 14px;
            height: 14px;
            border: 2px solid var(--border);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        .thinking-header .chevron {
            margin-left: auto;
            transition: transform 0.2s;
        }

        .thinking-header .chevron.open { transform: rotate(90deg); }

        .thinking-body {
            padding: 10px 12px;
            background: var(--thinking-bg);
            font-size: 13px;
            color: var(--text-secondary);
            line-height: 1.6;
            max-height: 200px;
            overflow-y: auto;
            white-space: pre-wrap;
            display: none;
        }

        .thinking-body.open { display: block; }

        /* Error */
        .message-error {
            text-align: center;
            padding: 10px 16px;
            background: rgba(239,68,68,0.1);
            border: 1px solid rgba(239,68,68,0.3);
            border-radius: var(--radius-sm);
            color: #fca5a5;
            font-size: 13px;
            margin: 10px auto;
            max-width: 90%;
        }

        /* Typing indicator */
        .typing-indicator {
            display: inline-flex;
            gap: 4px;
            padding: 4px 0;
        }

        .typing-indicator span {
            width: 6px;
            height: 6px;
            background: var(--text-secondary);
            border-radius: 50%;
            animation: blink 1.4s infinite both;
        }

        .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
        .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }

        @keyframes blink {
            0%, 80%, 100% { opacity: 0.2; }
            40% { opacity: 1; }
        }

        /* ============ Input Area ============ */
        .input-area {
            padding: 16px 20px;
            border-top: 1px solid var(--border);
            flex-shrink: 0;
            background: var(--bg-secondary);
        }

        .upload-preview {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            margin-bottom: 10px;
        }

        .markdown-preview {
            display: none;
            max-width: 900px;
            margin: 0 auto 10px;
            padding: 12px 14px;
            border: 1px solid rgba(124,58,237,0.28);
            border-radius: var(--radius);
            background: rgba(15,15,26,0.72);
            color: var(--text-primary);
            max-height: 260px;
            overflow: auto;
        }

        .markdown-preview.show { display: block; }

        .upload-tag {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 4px 10px;
            background: rgba(124,58,237,0.12);
            border: 1px solid rgba(124,58,237,0.25);
            border-radius: 20px;
            font-size: 12px;
            color: #c4b5fd;
        }

        .upload-tag .remove-file {
            background: none;
            border: none;
            color: #c4b5fd;
            cursor: pointer;
            padding: 0;
            font-size: 14px;
            line-height: 1;
        }

        .upload-tag .remove-file:hover { color: var(--danger); }

        .input-wrapper {
            display: flex;
            gap: 10px;
            max-width: 900px;
            margin: 0 auto;
            align-items: flex-end;
        }

        .input-actions {
            display: flex;
            gap: 4px;
            flex-shrink: 0;
        }

        .input-action-btn {
            background: none;
            border: 1px solid var(--border);
            color: var(--text-secondary);
            cursor: pointer;
            padding: 8px;
            border-radius: var(--radius-sm);
            transition: all 0.15s;
        }

        .input-action-btn:hover { background: var(--bg-hover); color: var(--text-primary); }
        .input-action-btn.active {
            background: rgba(124,58,237,0.18);
            border-color: rgba(196,181,253,0.45);
            color: #f3edff;
        }
        .input-action-btn svg { width: 18px; height: 18px; }

        .markdown-toggle {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 8px 9px;
            user-select: none;
            font-size: 12px;
            line-height: 1;
        }

        .markdown-toggle input {
            width: 13px;
            height: 13px;
            accent-color: var(--accent);
            margin: 0;
        }

        .input-wrapper textarea {
            flex: 1;
            padding: 10px 14px;
            border: 1px solid var(--border);
            border-radius: var(--radius);
            background: var(--bg-input);
            color: var(--text-primary);
            font-size: 14px;
            font-family: inherit;
            resize: none;
            outline: none;
            min-height: 42px;
            max-height: 140px;
            line-height: 1.5;
            transition: border-color 0.2s;
        }

        .input-wrapper textarea:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-glow); }
        .input-wrapper textarea::placeholder { color: var(--text-muted); }

        .send-btn {
            padding: 10px 20px;
            background: linear-gradient(135deg, var(--accent), #6D28D9);
            color: white;
            border: none;
            border-radius: var(--radius);
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            transition: all 0.2s;
            white-space: nowrap;
            flex-shrink: 0;
        }

        .send-btn:hover:not(:disabled) {
            background: linear-gradient(135deg, var(--accent-hover), #7C3AED);
            box-shadow: 0 0 20px var(--accent-glow);
        }

        .send-btn:disabled { opacity: 0.4; cursor: not-allowed; }

        /* ============ Overlay ============ */
        .sidebar-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.5);
            z-index: 99;
        }

        .sidebar-overlay.show { display: block; }

        /* ============ Drop Zone ============ */
        .drop-zone {
            position: fixed;
            inset: 0;
            background: rgba(15,15,26,0.9);
            z-index: 200;
            display: none;
            align-items: center;
            justify-content: center;
        }

        .drop-zone.show { display: flex; }

        .drop-zone-inner {
            border: 2px dashed var(--accent);
            border-radius: 20px;
            padding: 60px 80px;
            text-align: center;
            color: var(--text-secondary);
        }

        .drop-zone-inner svg { width: 48px; height: 48px; margin-bottom: 16px; color: var(--accent); }
        .drop-zone-inner p { font-size: 16px; }

        /* ============ Confirm Dialog ============ */
        .confirm-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.6);
            z-index: 300;
            align-items: center;
            justify-content: center;
        }

        .confirm-overlay.show { display: flex; }

        .confirm-box {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 24px;
            max-width: 360px;
            width: 90%;
            text-align: center;
        }

        .confirm-box p { margin-bottom: 20px; font-size: 14px; line-height: 1.6; }

        .confirm-btns { display: flex; gap: 10px; justify-content: center; }

        .confirm-btns button {
            padding: 8px 24px;
            border-radius: var(--radius-sm);
            cursor: pointer;
            font-size: 13px;
            font-weight: 500;
            border: 1px solid var(--border);
            transition: all 0.15s;
        }

        .btn-cancel { background: var(--bg-secondary); color: var(--text-primary); }
        .btn-cancel:hover { background: var(--bg-hover); }
        .btn-confirm-danger { background: var(--danger); color: #fff; border-color: var(--danger); }
        .btn-confirm-danger:hover { background: #dc2626; }

        /* ============ Mobile ============ */
        @media (max-width: 768px) {
            body {
                height: 100dvh;
            }

            .app {
                height: 100dvh;
            }

            .sidebar {
                position: fixed;
                left: 0;
                top: 0;
                bottom: 0;
                transform: translateX(-100%);
                padding-top: env(safe-area-inset-top);
                padding-bottom: env(safe-area-inset-bottom);
                width: min(86vw, var(--sidebar-width));
            }
            .sidebar.open { transform: translateX(0); }
            .sidebar-header {
                padding-top: 14px;
            }

            .main-header {
                padding: calc(10px + env(safe-area-inset-top)) 14px 10px;
                min-height: calc(52px + env(safe-area-inset-top));
            }

            .menu-toggle {
                display: flex;
                align-items: center;
                justify-content: center;
                width: 36px;
                height: 36px;
                padding: 0;
                flex: 0 0 auto;
            }

            .main-header .header-title {
                font-size: 16px;
            }

            .header-actions .icon-btn {
                width: 36px;
                height: 36px;
                padding: 0;
                justify-content: center;
            }

            .chat-container {
                padding: 14px 10px;
            }

            .message-content { max-width: 85%; }

            .message-row {
                gap: 8px;
                margin-bottom: 14px;
            }

            .message-avatar {
                width: 28px;
                height: 28px;
                border-radius: 8px;
                font-size: 12px;
            }

            .message-bubble {
                padding: 10px 12px;
                font-size: 14px;
            }

            .input-area {
                padding: 10px 10px calc(10px + env(safe-area-inset-bottom));
            }

            .input-wrapper {
                display: grid;
                grid-template-columns: 1fr auto;
                grid-template-areas:
                    "actions actions"
                    "text send";
                gap: 8px;
                align-items: stretch;
                max-width: none;
            }

            .input-actions {
                grid-area: actions;
                display: grid;
                grid-template-columns: 42px minmax(0, 1fr) minmax(0, 1fr);
                gap: 8px;
            }

            .input-action-btn {
                min-height: 38px;
                justify-content: center;
            }

            .markdown-toggle {
                padding: 8px 10px;
                min-width: 0;
                overflow: hidden;
            }

            .markdown-toggle span {
                overflow: hidden;
                text-overflow: ellipsis;
                white-space: nowrap;
            }

            .input-wrapper textarea {
                grid-area: text;
                min-height: 44px;
                max-height: 120px;
                width: 100%;
                padding: 10px 12px;
            }

            .send-btn {
                grid-area: send;
                min-width: 72px;
                padding: 10px 14px;
            }

            .upload-preview,
            .markdown-preview {
                max-width: none;
            }

            .markdown-preview {
                max-height: 180px;
                padding: 10px 12px;
                font-size: 13px;
            }
        }

        @media (max-width: 380px) {
            .input-actions {
                grid-template-columns: 38px 1fr 1fr;
                gap: 6px;
            }

            .markdown-toggle {
                font-size: 11px;
                gap: 4px;
                padding: 7px 7px;
            }

            .send-btn {
                min-width: 64px;
                padding: 10px 12px;
            }
        }
    </style>
</head>
<body>
    <div class="app">
        <!-- Sidebar -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <div class="sidebar-logo">
                    <div class="logo-icon">C</div>
                    <div class="logo-text">Claude Chat</div>
                </div>
                <button class="new-chat-btn" onclick="createNewSession()">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
                    新对话
                </button>
            </div>
            <div class="sidebar-list" id="sessionList"></div>
            <div class="sidebar-footer">
                <span class="footer-hint">局域网 AI 对话服务</span>
                <button type="button" class="feedback-btn" id="apiConfigBtn" onclick="openApiConfig()" style="display:none">API 配置</button>
                <button type="button" class="feedback-btn" onclick="openFeedback()">意见反馈</button>
            </div>
        </aside>

        <!-- Sidebar Overlay (mobile) -->
        <div class="sidebar-overlay" id="sidebarOverlay" onclick="toggleSidebar()"></div>

        <!-- Main -->
        <main class="main">
            <div class="main-header">
                <button class="menu-toggle" onclick="toggleSidebar()">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
                </button>
                <div class="header-title" id="headerTitle">Claude Chat</div>
                <div class="header-actions">
                    <button class="icon-btn danger" onclick="confirmDeleteSession()" title="删除当前会话">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>
                    </button>
                </div>
            </div>

            <div class="chat-container" id="chatContainer">
                <div class="welcome" id="welcome">
                    <div class="welcome-icon">✦</div>
                    <h2>欢迎使用 Claude Chat</h2>
                    <p>局域网 AI 对话服务，支持多会话管理、文件上传和流式输出。<br>点击「新对话」开始聊天。</p>
                </div>
            </div>

            <div class="input-area">
                <div class="upload-preview" id="uploadPreview"></div>
                <div class="markdown-preview markdown-body" id="markdownPreview"></div>
                <div class="input-wrapper">
                    <div class="input-actions">
                        <button class="input-action-btn" onclick="document.getElementById('fileInput').click()" title="上传文件">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"/></svg>
                        </button>
                        <label class="input-action-btn markdown-toggle" id="markdownToggleWrap" title="实时预览 Markdown">
                            <input type="checkbox" id="markdownToggle">
                            <span>Markdown</span>
                        </label>
                        <label class="input-action-btn markdown-toggle" id="webSearchToggleWrap" title="使用 Tavily 联网搜索">
                            <input type="checkbox" id="webSearchToggle">
                            <span>联网</span>
                        </label>
                    </div>
                    <textarea id="messageInput" placeholder="输入消息... (Enter 发送, Shift+Enter 换行)" rows="1" autofocus></textarea>
                    <button class="send-btn" id="sendBtn" onclick="handleSend()">发送</button>
                </div>
                <input type="file" id="fileInput" multiple hidden onchange="handleFileSelect(this.files)">
            </div>
        </main>
    </div>

    <!-- Drop Zone -->
    <div class="drop-zone" id="dropZone">
        <div class="drop-zone-inner">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
            <p>释放文件以上传</p>
        </div>
    </div>

    <!-- Feedback -->
    <div class="feedback-overlay" id="feedbackOverlay" onclick="if(event.target===this) closeFeedback()">
        <div class="feedback-modal" onclick="event.stopPropagation()">
            <h3>意见反馈</h3>
            <label for="feedbackText">反馈内容</label>
            <textarea id="feedbackText" placeholder="请描述问题或建议…"></textarea>
            <label for="feedbackContact">联系方式（可选）</label>
            <input type="text" id="feedbackContact" placeholder="邮箱 / 飞书等">
            <label for="feedbackImages">截图（可选）</label>
            <input type="file" id="feedbackImages" accept="image/*" multiple>
            <div class="feedback-actions">
                <button type="button" class="btn-secondary" onclick="closeFeedback()">取消</button>
                <button type="button" class="btn-primary" id="feedbackSubmitBtn" onclick="submitFeedback()">提交</button>
            </div>
        </div>
    </div>

    <!-- V2 每用户 API（局域网） -->
    <div class="feedback-overlay" id="apiConfigOverlay" onclick="if(event.target===this) closeApiConfig()">
        <div class="feedback-modal" onclick="event.stopPropagation()">
            <h3>API 配置（V2）</h3>
            <p class="footer-hint" id="v2ApiHint" style="margin-bottom:12px;">通过局域网 IP 访问且服务端开启 V2 时，需在此保存密钥与模型；用本机 127.0.0.1 / localhost 打开则始终使用服务器上的配置。</p>
            <label for="v2ModelInput">model（CLI --model，可空则沿用服务器 config.ini）</label>
            <input type="text" id="v2ModelInput" placeholder="例如 opus[1m]" autocomplete="off">
            <label for="v2EnvJson">环境变量 env（JSON 对象）</label>
            <textarea id="v2EnvJson" placeholder='{ "ANTHROPIC_AUTH_TOKEN": "...", "ANTHROPIC_BASE_URL": "https://..." }'></textarea>
            <div class="feedback-actions">
                <button type="button" class="btn-secondary" onclick="closeApiConfig()">取消</button>
                <button type="button" class="btn-secondary" onclick="clearApiConfig()">清除凭证</button>
                <button type="button" class="btn-primary" onclick="submitApiConfig()">保存</button>
            </div>
        </div>
    </div>

    <div class="toast" id="toast"></div>

    <!-- Confirm Dialog -->
    <div class="confirm-overlay" id="confirmOverlay">
        <div class="confirm-box">
            <p id="confirmText">确定要删除这个会话吗？</p>
            <div class="confirm-btns">
                <button class="btn-cancel" onclick="closeConfirm()">取消</button>
                <button class="btn-confirm-danger" id="confirmAction" onclick="doDeleteSession()">删除</button>
            </div>
        </div>
    </div>

    <script>
    // http://IP 非安全上下文，crypto.randomUUID 可能不存在，会导致整段脚本失败（发送无反应）
    function genUUID() {
        if (typeof crypto !== 'undefined' && typeof crypto.randomUUID === 'function') {
            return crypto.randomUUID();
        }
        return 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, function(c) {
            const r = Math.random() * 16 | 0;
            const v = c === 'x' ? r : (r & 0x3 | 0x8);
            return v.toString(16);
        });
    }

    // ==================== State ====================
    const TOKEN = new URLSearchParams(window.location.search).get('token') || null;
    let userId = localStorage.getItem('claude_user_id');
    if (!userId) {
        userId = 'u-' + genUUID();
        localStorage.setItem('claude_user_id', userId);
    }

    let currentSessionId = null;
    let sessions = [];
    let isStreaming = false;
    let pendingFiles = []; // {name, size} 文件名须与 /upload 返回的 name 一致，供 /chat 在服务端解析
    let markdownPreviewEnabled = localStorage.getItem('claude_markdown_preview') === '1';
    let webSearchEnabled = localStorage.getItem('claude_web_search_enabled') === '1';

    // ==================== DOM ====================
    const chatContainer = document.getElementById('chatContainer');
    const messageInput = document.getElementById('messageInput');
    const sendBtn = document.getElementById('sendBtn');
    const welcomeEl = document.getElementById('welcome');
    const sessionListEl = document.getElementById('sessionList');
    const headerTitle = document.getElementById('headerTitle');
    const uploadPreview = document.getElementById('uploadPreview');
    const markdownPreview = document.getElementById('markdownPreview');
    const markdownToggle = document.getElementById('markdownToggle');
    const markdownToggleWrap = document.getElementById('markdownToggleWrap');
    const webSearchToggle = document.getElementById('webSearchToggle');
    const webSearchToggleWrap = document.getElementById('webSearchToggleWrap');
    const sidebar = document.getElementById('sidebar');
    const sidebarOverlay = document.getElementById('sidebarOverlay');
    const dropZone = document.getElementById('dropZone');

    // ==================== Init ====================
    messageInput.addEventListener('input', function() {
        this.style.height = 'auto';
        this.style.height = Math.min(this.scrollHeight, 140) + 'px';
        updateMarkdownPreview();
    });

    if (markdownToggle) {
        markdownToggle.checked = markdownPreviewEnabled;
        markdownToggleWrap.classList.toggle('active', markdownPreviewEnabled);
        markdownToggle.addEventListener('change', function() {
            markdownPreviewEnabled = !!this.checked;
            localStorage.setItem('claude_markdown_preview', markdownPreviewEnabled ? '1' : '0');
            markdownToggleWrap.classList.toggle('active', markdownPreviewEnabled);
            updateMarkdownPreview();
        });
    }
    updateMarkdownPreview();

    if (webSearchToggle) {
        webSearchToggle.checked = webSearchEnabled;
        webSearchToggleWrap.classList.toggle('active', webSearchEnabled);
        webSearchToggle.addEventListener('change', function() {
            webSearchEnabled = !!this.checked;
            localStorage.setItem('claude_web_search_enabled', webSearchEnabled ? '1' : '0');
            webSearchToggleWrap.classList.toggle('active', webSearchEnabled);
        });
    }

    messageInput.addEventListener('keydown', function(e) {
        if (e.key === 'Enter' && !e.shiftKey) {
            e.preventDefault();
            handleSend();
        }
    });

    document.addEventListener('click', function(e) {
        if (!e.target.closest('.session-menu') && !e.target.closest('.session-menu-btn')) {
            closeAllSessionMenus();
        }
    });

    // Drag & Drop
    let dragCounter = 0;
    document.addEventListener('dragenter', e => {
        e.preventDefault();
        if (isStreaming) return;
        dragCounter++; dropZone.classList.add('show');
    });
    document.addEventListener('dragleave', e => { e.preventDefault(); dragCounter--; if (dragCounter <= 0) { dragCounter = 0; dropZone.classList.remove('show'); } });
    document.addEventListener('dragover', e => e.preventDefault());
    document.addEventListener('drop', e => {
        e.preventDefault();
        dragCounter = 0;
        dropZone.classList.remove('show');
        if (isStreaming) return;
        if (e.dataTransfer.files.length) handleFileSelect(e.dataTransfer.files);
    });

    // ==================== API Helpers ====================
    function apiHeaders() {
        const h = { 'Content-Type': 'application/json' };
        if (TOKEN) h['Authorization'] = 'Bearer ' + TOKEN;
        return h;
    }

    async function apiGet(url) {
        const r = await fetch(url, { headers: apiHeaders() });
        if (!r.ok) throw new Error(`HTTP ${r.status}`);
        return r.json();
    }

    async function apiPost(url, body) {
        const r = await fetch(url, { method: 'POST', headers: apiHeaders(), body: JSON.stringify(body) });
        if (!r.ok) throw new Error(`HTTP ${r.status}`);
        return r.json();
    }

    async function apiDelete(url) {
        const r = await fetch(url, { method: 'DELETE', headers: apiHeaders() });
        if (!r.ok) throw new Error(`HTTP ${r.status}`);
        const txt = await r.text();
        if (!txt || !txt.trim()) return {};
        try { return JSON.parse(txt); } catch (e) { return {}; }
    }

    async function apiPut(url, body) {
        const r = await fetch(url, { method: 'PUT', headers: apiHeaders(), body: JSON.stringify(body) });
        if (!r.ok) {
            let msg = `HTTP ${r.status}`;
            try { const j = await r.json(); msg = j.error || msg; } catch (_) {}
            throw new Error(msg);
        }
        return r.json();
    }

    function isLocalAccessHostname() {
        const h = (window.location.hostname || '').toLowerCase();
        return h === 'localhost' || h === '127.0.0.1' || h === '::1';
    }

    function updateApiConfigButtonVisibility() {
        const btn = document.getElementById('apiConfigBtn');
        if (!btn || !window.__featuresV2) return;
        btn.style.display = (!isLocalAccessHostname()) ? 'block' : 'none';
    }

    function updateWebSearchToggleAvailability() {
        if (!webSearchToggle || !webSearchToggleWrap) return;
        const ok = !!window.__tavilySearchConfigured;
        webSearchToggle.disabled = !ok;
        webSearchToggleWrap.style.display = ok ? 'inline-flex' : 'none';
        if (!ok) {
            webSearchEnabled = false;
            webSearchToggle.checked = false;
            webSearchToggleWrap.classList.remove('active');
        }
    }

    async function loadFeatures() {
        try {
            const r = await fetch('/api/features');
            const j = await r.json();
            window.__featuresV2 = !!j.v2_multi_user_api;
            window.__tavilySearchConfigured = !!j.tavily_search_configured;
            updateApiConfigButtonVisibility();

    async function submitFeedback() {
        const text = (document.getElementById('feedbackText').value || '').trim();
        const contact = (document.getElementById('feedbackContact').value || '').trim();
        const files = document.getElementById('feedbackImages').files;
        if (!text) {
            showToast('请填写反馈内容', 2500);
            return;
        }
        const btn = document.getElementById('feedbackSubmitBtn');
        btn.disabled = true;
        try {
            const fd = new FormData();
            fd.append('text', text);
            fd.append('contact', contact);
            fd.append('user_id', userId);
            for (let i = 0; i < files.length; i++) fd.append('images', files[i]);
            const h = {};
            if (TOKEN) h['Authorization'] = 'Bearer ' + TOKEN;
            const r = await fetch('/feedback', { method: 'POST', headers: h, body: fd });
            if (!r.ok) throw new Error('HTTP ' + r.status);
            const data = await r.json();
            showToast('感谢反馈！已保存：' + (data.saved_to || ''), 5000);
            document.getElementById('feedbackText').value = '';
            document.getElementById('feedbackContact').value = '';
            document.getElementById('feedbackImages').value = '';
            closeFeedback();
        } catch (e) {
            console.error(e);
            showToast('提交失败，请稍后重试', 3500);
        } finally {
            btn.disabled = false;
        }
    }

        const s = sessions.find(x => x.id === sessionId);

    function appendMessage(role, content, thinking, files) {
        const isAi = role === 'ai' || role === 'assistant';
        const row = document.createElement('div');
        row.className = 'message-row ' + (isAi ? 'ai' : 'user');

        let avatarHtml = '';
        let filesHtml = '';
        let thinkingHtml = '';

        if (isAi) {
            avatarHtml = '<div class="message-avatar ai">C</div>';
        } else {
            avatarHtml = '<div class="message-avatar user-av">U</div>';
        }

        if (files && files.length) {
            filesHtml = '<div class="message-files">';
            for (const f of files) {
                const name = typeof f === 'string' ? f : f.name;
                filesHtml += `<span class="file-tag"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>${escapeHtml(name)}</span>`;
            }
            filesHtml += '</div>';
        }

        if (thinking) {
            const thinkId = 'think-' + Math.random().toString(36).substr(2, 8);
            thinkingHtml = `
                <div class="thinking-block">
                    <div class="thinking-header" onclick="toggleThinking('${thinkId}')">
                        <span>思考过程</span>
                        <svg class="chevron" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 18 15 12 9 6"/></svg>
                    </div>
                    <div class="thinking-body" id="${thinkId}">${escapeHtml(thinking)}</div>
                </div>
            `;
        }

        const contentDiv = document.createElement('div');
        contentDiv.className = 'message-content';
        contentDiv.innerHTML = filesHtml + thinkingHtml;
        const bubble = document.createElement('div');
        bubble.className = 'message-bubble markdown-body';
        if (isAi || role === 'user') {
            renderMarkdownInto(bubble, content || '');

    function escapeHtml(str) {
        if (!str) return '';
        const d = document.createElement('div');
        d.textContent = str;
        return d.innerHTML;
    }

    function escapeAttr(str) {
        return escapeHtml(str).replace(/"/g, '&quot;');
    }

    function safeFilename(str) {
        const cleaned = String(str || 'claude-chat')
            .replace(/[<>:"/\\|?*\x00-\x1f]/g, '_')
            .replace(/\s+/g, ' ')
            .trim()
            .slice(0, 80);
        return cleaned || 'claude-chat';
    }

    function renderInlineMarkdown(str) {
        let s = String(str || '');
        const codes = [];
        const links = [];
        s = s.replace(/`([^`]+)`/g, (_, code) => {
            const key = `@@CODE${codes.length}@@`;
            codes.push(`<code>${escapeHtml(code)}</code>`);
            return key;
        });
        s = s.replace(/\[([^\]]+)\]\((https?:\/\/[^\s)]+)\)/g, (_, label, url) => {
            const key = `@@LINK${links.length}@@`;
            links.push(`<a href="${escapeAttr(url)}" target="_blank" rel="noopener noreferrer">${escapeHtml(label)}</a>`);
            return key;
        });
        s = escapeHtml(s);
        s = s.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
        s = s.replace(/__([^_]+)__/g, '<strong>$1</strong>');
        s = s.replace(/(^|[^*])\*([^*\n]+)\*/g, '$1<em>$2</em>');
        s = s.replace(/(^|[^_])_([^_\n]+)_/g, '$1<em>$2</em>');
        for (let i = 0; i < codes.length; i++) {
            s = s.replace(`@@CODE${i}@@`, codes[i]);
        }
        for (let i = 0; i < links.length; i++) {
            s = s.replace(`@@LINK${i}@@`, links[i]);
        }
        return s;
    }

    function splitMarkdownTableRow(row) {
        let s = String(row || '').trim();
        if (s.startsWith('|')) s = s.slice(1);
        if (s.endsWith('|')) s = s.slice(0, -1);
        const cells = [];
        let cur = '';
        for (let i = 0; i < s.length; i++) {
            const ch = s[i];
            if (ch === '\\' && s[i + 1] === '|') {
                cur += '|';
                i++;
            } else if (ch === '|') {
                cells.push(cur.trim());
                cur = '';
            } else {
                cur += ch;
            }
        }
        cells.push(cur.trim());
        return cells;
    }

    function isMarkdownTableSeparator(row) {
        const cells = splitMarkdownTableRow(row);
        if (cells.length < 2) return false;
        return cells.every(c => /^:?[-=]{3,}:?$/.test(c.trim()));
    }

    function tableAlignments(separatorRow) {
        return splitMarkdownTableRow(separatorRow).map(c => {
            const t = c.trim();
            if (t.startsWith(':') && t.endsWith(':')) return 'center';
            if (t.endsWith(':')) return 'right';
            return 'left';
        });
    }

    function renderMarkdownTable(rows) {
        if (!rows || rows.length < 2) return '';
        const header = splitMarkdownTableRow(rows[0]);
        const aligns = tableAlignments(rows[1]);
        const bodyRows = rows.slice(2).map(splitMarkdownTableRow);
        const ths = header.map((cell, i) => {
            const align = aligns[i] || 'left';
            return `<th style="text-align:${align}">${renderInlineMarkdown(cell)}</th>`;
        }).join('');
        const trs = bodyRows.map(cells => {
            const tds = header.map((_, i) => {
                const align = aligns[i] || 'left';
                return `<td style="text-align:${align}">${renderInlineMarkdown(cells[i] || '')}</td>`;
            }).join('');
            return `<tr>${tds}</tr>`;
        }).join('');
        return `<div class="markdown-table-wrap"><table><thead><tr>${ths}</tr></thead><tbody>${trs}</tbody></table></div>`;
    }

    function renderMarkdownBlocks(markdown) {
        const lines = String(markdown || '').replace(/\r\n/g, '\n').split('\n');
        const out = [];
        let para = [];
        let listType = null;

        const flushPara = () => {
            if (!para.length) return;
            out.push('<p>' + para.map(renderInlineMarkdown).join('<br>') + '</p>');
            para = [];
        };
        const closeList = () => {
            if (!listType) return;
            out.push(`</${listType}>`);
            listType = null;
        };

        for (let lineIndex = 0; lineIndex < lines.length; lineIndex++) {
            const raw = lines[lineIndex];
            const line = raw.replace(/\s+$/g, '');
            if (!line.trim()) {
                flushPara();
                closeList();
                continue;
            }
            if (line.includes('|') && lineIndex + 1 < lines.length && isMarkdownTableSeparator(lines[lineIndex + 1])) {
                flushPara();
                closeList();
                const tableRows = [line, lines[lineIndex + 1].replace(/\s+$/g, '')];
                lineIndex += 2;
                while (lineIndex < lines.length) {
                    const next = lines[lineIndex].replace(/\s+$/g, '');
                    if (!next.trim() || !next.includes('|')) break;
                    tableRows.push(next);
                    lineIndex++;
                }
                lineIndex--;
                out.push(renderMarkdownTable(tableRows));
                continue;
            }
            const heading = /^(#{1,4})\s+(.+)$/.exec(line);
            if (heading) {
                flushPara();
                closeList();
                const level = heading[1].length;
                out.push(`<h${level}>${renderInlineMarkdown(heading[2])}</h${level}>`);
                continue;
            }
            if (/^---+$/.test(line.trim())) {
                flushPara();
                closeList();
                out.push('<hr>');
                continue;
            }
            const ul = /^\s*[-*]\s+(.+)$/.exec(line);
            if (ul) {
                flushPara();
                if (listType !== 'ul') {
                    closeList();
                    out.push('<ul>');
                    listType = 'ul';
                }
                out.push(`<li>${renderInlineMarkdown(ul[1])}</li>`);
                continue;
            }
            const ol = /^\s*\d+\.\s+(.+)$/.exec(line);
            if (ol) {
                flushPara();
                if (listType !== 'ol') {
                    closeList();
                    out.push('<ol>');
                    listType = 'ol';
                }
                out.push(`<li>${renderInlineMarkdown(ol[1])}</li>`);
                continue;
            }
            const quote = /^\s*>\s?(.*)$/.exec(line);
            if (quote) {
                flushPara();
                closeList();
                out.push(`<blockquote>${renderInlineMarkdown(quote[1])}</blockquote>`);
                continue;
            }
            closeList();
            para.push(line);
        }
        flushPara();
        closeList();
        return out.join('');
    }

    function renderMarkdown(markdown) {
        const text = String(markdown || '');
        const out = [];
        let idx = 0;
        const fenceRe = /```([A-Za-z0-9_-]*)[ \t]*\n?([\s\S]*?)```/g;
        let m;
        while ((m = fenceRe.exec(text)) !== null) {
            out.push(renderMarkdownBlocks(text.slice(idx, m.index)));
            const lang = m[1] ? ` data-lang="${escapeAttr(m[1])}"` : '';
            out.push(`<pre${lang}><code>${escapeHtml(m[2])}</code></pre>`);
            idx = fenceRe.lastIndex;
        }
        out.push(renderMarkdownBlocks(text.slice(idx)));
        return out.join('') || '';
    }

    function renderMarkdownInto(el, markdown) {
        if (!el) return;
        el.classList.add('markdown-body');
        el.innerHTML = renderMarkdown(markdown || '');
    }

    function renderExportMessage(m) {
        const role = m && m.role;
        const isAi = role === 'ai' || role === 'assistant';
        const files = (m && m.files) || [];
        let filesHtml = '';
        if (files && files.length) {
            filesHtml = '<div class="message-files">' + files.map(f => {
                const name = typeof f === 'string' ? f : (f.display_name || f.name || '');
                return `<span class="file-tag">${escapeHtml(name)}</span>`;
            }).join('') + '</div>';
        }
        let thinkingHtml = '';
        if (isAi && m.thinking) {
            thinkingHtml = `
                <div class="thinking-block">
                    <div class="thinking-header">思考过程</div>
                    <div class="thinking-body">${escapeHtml(m.thinking)}</div>
                </div>`;
        }
        const bubble = `<div class="message-bubble markdown-body">${renderMarkdown((m && m.content) || '')}</div>`;
        const avatar = `<div class="message-avatar">${isAi ? 'C' : 'U'}</div>`;
        return `<div class="message-row ${isAi ? 'ai' : 'user'}">${avatar}<div class="message-content">${filesHtml}${thinkingHtml}${bubble}</div></div>`;
    }

    function buildExportHtml(session, messages) {
        const title = (session && session.title) || 'Claude Chat';
        const generatedAt = new Date().toLocaleString();
        const body = (messages || []).map(renderExportMessage).join('\n');
        return `<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>${escapeHtml(title)} - Claude Chat Export</title>
  <style>${exportCss()}</style>
</head>
<body>
  <main class="export-page">
    <header class="export-header">
      <h1>${escapeHtml(title)}</h1>
      <div class="export-meta">导出时间：${escapeHtml(generatedAt)} · 消息数：${(messages || []).length}</div>
    </header>
    <section class="export-chat">
      ${body || '<p class="export-meta">当前对话暂无内容。</p>'}
    </section>
  </main>
</body>
</html>`;
    }

    async function saveHtmlFile(html, filename, existingHandle) {
        const blob = new Blob([html], { type: 'text/html;charset=utf-8' });
        if (existingHandle || window.showSaveFilePicker) {
            const handle = existingHandle || await window.showSaveFilePicker({
                suggestedName: filename,
                types: [{ description: 'HTML 文件', accept: { 'text/html': ['.html'] } }],
            });
            const writable = await handle.createWritable();
            await writable.write(blob);
            await writable.close();
            return 'saved';
        }
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = filename;
        document.body.appendChild(a);
        a.click();
        a.remove();
        setTimeout(() => URL.revokeObjectURL(url), 1000);
        return 'downloaded';
    }

    async function exportSessionHtml(event, sessionId) {
        if (event) event.stopPropagation();
        closeAllSessionMenus();
        if (isStreaming) {
            showToast('当前正在回复，结束后再导出');
            return;
        }
        const session = sessions.find(s => s.id === sessionId) || { id: sessionId, title: 'Claude Chat' };
        const filename = safeFilename(session.title || sessionId) + '.html';
        let saveHandle = null;
        try {
            if (window.showSaveFilePicker) {
                saveHandle = await window.showSaveFilePicker({
                    suggestedName: filename,
                    types: [{ description: 'HTML 文件', accept: { 'text/html': ['.html'] } }],
                });
            }
            showToast('正在准备导出...', 1600);
            const messages = await apiGet(`/sessions/${sessionId}/messages?user_id=${encodeURIComponent(userId)}`);
            const html = buildExportHtml(session, messages);
            await saveHtmlFile(html, filename, saveHandle);
            showToast('已导出 HTML');
        } catch (e) {
            if (e && e.name === 'AbortError') return;
            console.error('导出失败:', e);
            showToast('导出失败: ' + (e.message || e));
        }
    }

    function updateMarkdownPreview() {
        if (!markdownPreview) return;
        const text = messageInput ? messageInput.value : '';
        if (!markdownPreviewEnabled || !text.trim()) {
            markdownPreview.classList.remove('show');
            markdownPreview.innerHTML = '';
            return;
        }
        renderMarkdownInto(markdownPreview, text);
        markdownPreview.classList.add('show');
